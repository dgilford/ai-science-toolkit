name: Window warmup
# Anchors the 5-hour Claude usage window at ~5:00am / 10:02am / 3:04pm ET on weekdays by
# running a real `claude -p` session. Cloud routines (claude.ai/code/routines) spend a token
# but do NOT anchor the window — only an authenticated `claude -p` session does. See
# .ai/routines.md and the "Scheduled warmup" section of CLAUDE.md for the why.
#
# Setup: `claude setup-token` (1-year OAuth token) → store as repo secret
#   CLAUDE_CODE_OAUTH_TOKEN. Do NOT set ANTHROPIC_API_KEY (it takes precedence and bills the
#   API instead of the subscription) and do NOT pass --bare (it ignores the OAuth token).
on:
  workflow_dispatch:        # manual test runs
  schedule:
    # Each target hour fires 4 staggered attempts (:02, :15, :30, :45 ET) to absorb GitHub
    # cron jitter/skips (GH fires late, never early). The earliest attempt that lands while
    # no window is open anchors it; later attempts fall inside the now-open window and are
    # harmless no-ops — a ping inside an open window cannot re-anchor or move the reset, so
    # no "did the previous one fire?" check is needed.
    - cron: '2,15,30,45 5 * * 1-5'   # ~5:00am ET block
      timezone: America/New_York
    - cron: '2,15,30,45 10 * * 1-5'  # ~10:00am ET block
      timezone: America/New_York
    - cron: '2,15,30,45 15 * * 1-5'  # ~3:00pm ET block
      timezone: America/New_York

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @anthropic-ai/claude-code
      - name: Warmup ping
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude -p "Say 'Alláh-u-Abhá'." --model haiku --no-session-persistence
