name: Window warmup
# Tier 2 of the window-warmup system — the tier that actually anchors precisely.
# Precise timing comes from workflow_dispatch fired by an external scheduler (cron-job.org),
# NOT from `schedule:` (observed to fire 2–3h late; see window-warmup/README.md for the why,
# the other tiers, and the cron-job.org → dispatch setup).
#
# Setup: `claude setup-token` (1-year OAuth token) → store as repo secret
#   CLAUDE_CODE_OAUTH_TOKEN. Do NOT set ANTHROPIC_API_KEY (it takes precedence and bills the
#   API instead of the subscription) and do NOT pass --bare (it ignores the OAuth token).
on:
  workflow_dispatch:        # primary precise trigger (external cron) + manual test runs
  schedule:
    # Coarse last-resort backup only; expect multi-hour lateness. Off-round minute to dodge the
    # worst top-of-hour contention. Real timing is workflow_dispatch (external cron).
    - cron: '7 5,10,15 * * 1-5'
      timezone: America/New_York

permissions:
  contents: read

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @anthropic-ai/claude-code
      - name: Warmup ping
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # A session-limited window is an expected, non-actionable outcome (nothing to warm — the
        # window is already anchored/capped), so log it and exit 0 rather than failing the job and
        # emailing a failure alert. Any OTHER non-zero exit is a real fault and still fails the job.
        # The monthly health-check routine reads run conclusions from the Actions API, so a capped
        # ping and a real success both need to land as job success — only a genuine failure exits
        # non-zero here.
        run: |
          set +e
          out=$(claude -p "Say 'Alláh-u-Abhá'." --model haiku --no-session-persistence 2>&1)
          rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$out" | grep -qi 'session limit'; then
            echo "::notice::Window already session-limited — warmup no-op, not a failure."
            exit 0
          fi
          exit "$rc"
